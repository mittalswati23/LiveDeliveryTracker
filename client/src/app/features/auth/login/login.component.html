<div class="login-page">
  <div class="login-card">

    <div class="brand">
      <span class="brand-icon">&#128230;</span>
      <span class="brand-name">TRACKR</span>
      <span class="brand-tag">DISPATCH SYSTEM v2.1</span>
    </div>

    <div class="card-header">
      <h1>Dispatcher Login</h1>
      <p>Sign in to access the live tracking dashboard</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>

      <div class="field">
        <label for="email">EMAIL ADDRESS</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          autocomplete="username"
          [class.invalid]="form.get('email')?.invalid && form.get('email')?.touched"
        />
      </div>

      <div class="field">
        <label for="password">PASSWORD</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="••••••••••"
          [class.invalid]="form.get('password')?.invalid && form.get('password')?.touched"
        />
      </div>

      @if (errorMessage()) {
        <div class="error-banner">{{ errorMessage() }}</div>
      }

      <button type="submit" class="btn-signin" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span> SIGNING IN...
        } @else {
          <span class="btn-arrow">&#8594;</span> SIGN IN
        }
      </button>

    </form>

    <div class="security-note">
      <span class="dot"></span>
      SECURED WITH JWT &middot; EXPIRES 8H
    </div>

  </div>
</div>
