<div class="card" [class.selected]="selected()" (click)="onClick()">
  <div class="card-top">
    <span class="delivery-number">{{ delivery().deliveryNumber }}</span>
    <app-status-badge [status]="delivery().status" />
  </div>
  <div class="card-recipient">{{ delivery().recipientName }}</div>
  <div class="card-address">{{ delivery().destinationAddress }}</div>
  <div class="card-meta">
    <span>{{ delivery().driverName }}</span>
    <span>{{ delivery().estimatedMinutes | eta }} &middot; {{ delivery().totalRouteDistanceMiles | number:'1.1-1' }} mi</span>
  </div>
</div>
