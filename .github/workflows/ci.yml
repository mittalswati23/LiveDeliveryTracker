name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

  # ── .NET build + integration tests ─────────────────────────────────────────
  build-api:
    name: API — build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore server/DeliveryTracker.Tests/DeliveryTracker.Tests.csproj

      - name: Build
        run: dotnet build server/DeliveryTracker.Tests/DeliveryTracker.Tests.csproj --no-restore

      - name: Test
        run: >
          dotnet test server/DeliveryTracker.Tests/DeliveryTracker.Tests.csproj
          --no-build
          --verbosity normal
          --logger "console;verbosity=detailed"

  # ── Angular production build ────────────────────────────────────────────────
  build-client:
    name: Client — build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Build (production)
        run: npx ng build --configuration=production
        working-directory: client

